<!DOCTYPE html>
<html>
<head>
  <title>Phone Number Will Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; background: #0f172a; color: white; }
    .box { background: #1e293b; padding: 25px; border-radius: 15px; max-width: 400px; margin: 20px auto; box-shadow: 0 0 20px #007bff50; }
    h2 { color: #38bdf8; }
    input { padding: 12px; width: 85%; margin: 15px; border: 2px solid #38bdf8; border-radius: 8px; background: #0f172a; color: white; font-size: 16px; }
    button { padding: 14px 30px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    #result { margin-top: 25px; font-size: 20px; font-weight: bold; color: #4ade80; }
    .tag { font-size: 12px; color: #94a3b8; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>📱 Phone Number Will Generator</h2>
    <p>CEO Harsh Dixit™ | Gareeb ka Legal Saathi</p>
    <input type="text" id="name" placeholder="Apna Naam Likho">
    <br>
    <button onclick="generate()">Apna Lucky Number Jano</button>
    <div id="result"></div>
    <p class="tag">World's First Phone Number Will Generator</p>
  </div>
  <script>
    function generate() {
      let name = document.getElementById('name').value;
      if(name == "") { alert("Naam to daal bhai CEO"); return; }
      let num = "9" + Math.floor(100000000 + Math.random() * 900000000);
      document.getElementById('result').innerHTML = name + " ji, aapka lucky number: <br><br>🎯 " + num;
    }
  </script>
</body>
</html>
